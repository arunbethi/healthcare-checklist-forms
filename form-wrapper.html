<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Healthcare Checklist</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1F4E78 0%, #2E75B6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { color: #1F4E78; font-size: 22px; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 30px; }

    .email-box {
      background: #f0f7ff;
      border: 2px solid #2E75B6;
      border-radius: 8px;
      padding: 16px 20px;
      margin: 20px 0;
    }
    .email-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .email-value { font-size: 18px; font-weight: bold; color: #1F4E78; word-break: break-all; }

    .copy-btn {
      background: #2E75B6;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 24px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }
    .copy-btn:hover { background: #1F4E78; }
    .copy-btn.copied { background: #28a745; }

    .instruction {
      background: #fff8e1;
      border-left: 4px solid #FFC107;
      border-radius: 4px;
      padding: 14px 16px;
      margin: 20px 0;
      text-align: left;
      font-size: 13px;
      color: #555;
      line-height: 1.6;
    }
    .instruction strong { color: #333; }

    .open-btn {
      display: block;
      background: #1F4E78;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 24px;
      transition: background 0.2s;
      border: none;
      cursor: pointer;
      width: 100%;
    }
    .open-btn:hover { background: #163d5f; }

    .footer { font-size: 11px; color: #aaa; margin-top: 20px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">📋</div>
  <h1 id="formTitle">Healthcare Checklist</h1>
  <p class="subtitle">Please complete the checklist below</p>

  <div class="email-box">
    <div class="email-label">Recruiter Email (Step 1 of form)</div>
    <div class="email-value" id="emailDisplay">Loading...</div>
    <button class="copy-btn" id="copyBtn" onclick="copyEmail()">📋 Copy Email</button>
  </div>

  <div class="instruction">
    <strong>Instructions:</strong><br>
    1. Click <strong>"Open Checklist"</strong> below<br>
    2. In the first field <em>"Recruiter Email"</em>, paste the email above<br>
    3. Complete the rest of the checklist
  </div>

  <button class="open-btn" id="openBtn" onclick="openForm()">Open Checklist →</button>

  <p class="footer">Powered by Zenex Partners</p>
</div>

<script>
  var params = new URLSearchParams(window.location.search);
  var formUrl      = params.get('formUrl')       || '';
  var recruiterEmail = params.get('recruiterEmail') || '';
  var formName     = params.get('formName')      || 'Healthcare Checklist';

  // Update page
  document.getElementById('formTitle').textContent = formName;
  document.getElementById('emailDisplay').textContent = recruiterEmail || 'Not provided';
  document.title = formName;

  // Build the target URL with email in hash
  var targetUrl = formUrl;
  if (formUrl && recruiterEmail) {
    try {
      var u = new URL(formUrl);
      u.hash = 'recruiterEmail=' + encodeURIComponent(recruiterEmail);
      targetUrl = u.toString();
    } catch(e) {
      targetUrl = formUrl + '#recruiterEmail=' + encodeURIComponent(recruiterEmail);
    }
  }

  function copyEmail() {
    if (!recruiterEmail) return;
    navigator.clipboard.writeText(recruiterEmail).then(function() {
      var btn = document.getElementById('copyBtn');
      btn.textContent = '✅ Copied!';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = '📋 Copy Email';
        btn.classList.remove('copied');
      }, 2000);
    }).catch(function() {
      // Fallback for browsers without clipboard API
      var ta = document.createElement('textarea');
      ta.value = recruiterEmail;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      var btn = document.getElementById('copyBtn');
      btn.textContent = '✅ Copied!';
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = '📋 Copy Email';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function openForm() {
    if (targetUrl) {
      window.open(targetUrl, '_blank');
    } else {
      alert('Form URL not found. Please contact your recruiter.');
    }
  }
</script>
</body>
</html>
